name: Generate Index

on:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - 'generate_index.py'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run index generator
        run: python generate_index.py
      
      - name: Check if index.html exists and changed
        id: check
        run: |
          if [ -f index.html ]; then
            echo "Index file created successfully"
            echo "exists=true" >> $GITHUB_OUTPUT
            if git diff --quiet index.html 2>/dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "ERROR: index.html was not created!"
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check.outputs.exists == 'true' && steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "🤖 Auto-generate index.html"
          git push
